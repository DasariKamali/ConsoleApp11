# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - main

pool:
  name: SelfHostedPool

steps:
# Step 1: Checkout code from GitHub
- checkout: self
  displayName: 'Checkout code'

# Step 2: Install .NET SDK (ensure you're using the correct version)
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '6.x'  # Adjust to the version of .NET your project uses
    installationPath: $(Agent.ToolsDirectory)/dotnet

# Step 3: Restore the NuGet packages
- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

# Step 4: Build the project
- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration Release'

# Step 5: Publish the project
- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    projects: '**/*.csproj'
    publishWebProjects: false
    zipAfterPublish: true
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/publish'

# Step 6: Ensure the 'build-output' directory exists (or create it)
- script: |
    echo "Checking if build-output directory exists..."
    if (!(Test-Path "$(Build.ArtifactStagingDirectory)/build-output")) {
        echo "Directory does not exist. Creating it now..."
        New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/build-output"
    }
  displayName: 'Ensure build-output directory exists'

# Step 7: Copy files to the artifact staging directory (if needed)
- task: CopyFiles@2
  inputs:
    sourceFolder: '$(Build.ArtifactStagingDirectory)/publish'  # Adjust based on your project output
    targetFolder: '$(Build.ArtifactStagingDirectory)/build-output'  # Destination folder for the artifacts

# Step 8: Create .zip file (using PowerShell on Windows agent)
- script: |
    echo "Creating zip file..."
    powershell -Command "Compress-Archive -Path $(Build.ArtifactStagingDirectory)/build-output/* -DestinationPath $(Build.ArtifactStagingDirectory)/myArtifact.zip"
  displayName: 'Create .zip file'

# Step 9: Publish build artifacts
- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'  # Path to your staged artifacts
    ArtifactName: 'drop'
    publishLocation: 'Container'

# Step 10: Upload .zip file(s) to Azure Blob Storage
- task: AzureFileCopy@6
  displayName: 'Upload Artifact to Azure Blob'
  inputs:
    SourcePath: '$(Build.ArtifactStagingDirectory)/*.zip'  # Path to your .zip file(s)
    azureSubscription: 'Nova'  # Azure service connection
    Destination: 'AzureBlob'  # Destination type
    storage: 'kamdevopsstr'  # Storage account name
    ContainerName: 'kamcontainer'  # Blob container name
    AdditionalArguments: '--log-level=DEBUG'  # Optional: Enables debug logging
